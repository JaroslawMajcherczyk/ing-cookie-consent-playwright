name: Playwright E2E

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  cookie-consent-test:
    name: Browser - ${{ matrix.browser }}

    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Display environment versions
        run: |
          python --version
          python -m pip --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps "${{ matrix.browser }}"

      - name: Run Playwright tests
        run: |
          python -m pytest tests/test_cookie_consent.py \
            --browser "${{ matrix.browser }}" \
            --tracing=retain-on-failure \
            --screenshot=only-on-failure \
            --full-page-screenshot \
            --output="test-results/${{ matrix.browser }}" \
            --junitxml="test-results/${{ matrix.browser }}/junit.xml" \
            -v

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.browser }}
          path: test-results/${{ matrix.browser }}
          if-no-files-found: warn
          retention-days: 7